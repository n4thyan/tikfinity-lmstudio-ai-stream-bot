<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PotatoBrain Terminal Overlay</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="shell">
    <section class="terminal" aria-live="polite">
      <header class="terminal-bar">
        <div class="terminal-title">
          <span class="term-dot" aria-hidden="true"></span>
          <span class="title">C:\\POTATOBRAIN\\LIVE.EXE</span>
        </div>
        <span class="status" id="status">booting</span>
      </header>

      <section class="terminal-screen">
        <div class="boot-row">
          <span class="prompt-mark">&gt;</span>
          <span id="speaker">POTATOBRAIN</span>
          <span class="command-hint">commands: !ask  !mood  !lore  !status</span>
        </div>

        <p class="reply" id="reply">Waiting for TikTok chat...</p>
        <p class="prompt" id="prompt"></p>
      </section>

      <footer class="terminal-footer">
        <span id="mood">mood: normal</span>
        <span id="platform">platform: waiting</span>
        <span id="tts">tts: off</span>
      </footer>
    </section>
  </main>
  <script src="/static/overlay.js"></script>
</body>
</html>
