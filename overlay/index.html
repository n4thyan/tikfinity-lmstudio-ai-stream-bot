<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PotatoBrain Overlay</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="shell">
    <section class="window">
      <header class="titlebar">
        <span class="dot"></span>
        <span class="title">PotatoBrain.exe</span>
        <span class="status" id="status">booting</span>
      </header>
      <section class="screen">
        <p class="label" id="speaker">POTATOBRAIN</p>
        <p class="reply" id="reply">Waiting for TikTok chat...</p>
        <p class="prompt" id="prompt"></p>
      </section>
      <footer class="footer">
        <span id="mood">mood: normal</span>
        <span id="tts">tts: off</span>
      </footer>
    </section>
  </main>
  <script src="/static/overlay.js"></script>
</body>
</html>
